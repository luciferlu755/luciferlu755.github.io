---
layout: default
title: 我的解題日誌
---

<h2>最新文章</h2>
<ul>
  <!-- Jekyll 的神奇語法：自動跑迴圈把所有文章列出來 -->
  {% for post in site.posts %}
    <li style="margin-bottom: 10px;">
      <span style="color: #666; font-size: 0.9em; margin-right: 10px;">
        {{ post.date | date: "%Y-%m-%d" }}
      </span>
      <a href="{{ post.url }}" style="color: #0076df; text-decoration: none; font-weight: bold;">
        {{ post.title }}
      </a>
    </li>
  {% endfor %}
</ul>
